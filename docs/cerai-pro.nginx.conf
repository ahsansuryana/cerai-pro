# Contoh konfigurasi Nginx untuk Cerai.Pro
# Letakkan di /etc/nginx/sites-available/cerai-pro
# lalu buat symlink: sudo ln -s /etc/nginx/sites-available/cerai-pro /etc/nginx/sites-enabled/
# Test: sudo nginx -t
# Reload: sudo systemctl reload nginx

server {
    listen 80;
    server_name cerai-pro.local; # Ganti dengan domain atau IP kamu

    root /var/www/cerai-pro; # Sesuaikan path dengan lokasi file di server
    index index.html;

    # Fallback ke index.html untuk SPA-like routing (tapi ini multi-page, jadi ini jaga-jaga)
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(css|js|ico|svg|png|jpg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
