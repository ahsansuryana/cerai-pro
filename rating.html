<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/jpeg" href="icon.jpeg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Penilaian - Cerai.Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            toscaDark: '#0D7A87',
            toscaLight: '#20B2AA',
            oceanBlue: '#4A9DEC',
            oceanLight: '#EBF4FA',
            sandWhite: '#F7FCFC'
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-sandWhite text-slate-800 antialiased min-h-screen flex flex-col items-center justify-center p-6">

  <div class="w-full max-w-lg mx-auto bg-white p-8 rounded-2xl shadow-xl border border-oceanLight text-center space-y-6">
    <a href="index.html" class="inline-flex items-center gap-2 text-toscaDark font-bold text-lg hover:text-toscaLight transition-colors">
      <svg class="w-8 h-8" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M85 35 C75 36, 68 40, 58 40 C52 40, 48 43, 44 46"></path>
        <path d="M78 48 C72 48, 65 44, 52 44 C46 44, 42 47, 39 50"></path>
        <path d="M15 65 C25 64, 32 60, 42 60 C48 60, 52 57, 56 54"></path>
        <path d="M22 52 C28 52, 35 56, 48 56 C54 56, 58 53, 61 50"></path>
      </svg>
      Cerai.Pro
    </a>

    <h3 class="text-2xl font-bold text-toscaDark">Berikan Penilaian Konsultasi</h3>
    <p class="text-sm text-slate-500">Bagaimana pengalaman Anda berkonsultasi bersama tim hukum Cerai.Pro?</p>

    <div class="flex justify-center gap-2 text-2xl my-2">
      <span class="rating-star cursor-pointer text-slate-300" data-value="1">&#9734;</span>
      <span class="rating-star cursor-pointer text-slate-300" data-value="2">&#9734;</span>
      <span class="rating-star cursor-pointer text-slate-300" data-value="3">&#9734;</span>
      <span class="rating-star cursor-pointer text-slate-300" data-value="4">&#9734;</span>
      <span class="rating-star cursor-pointer text-slate-300" data-value="5">&#9734;</span>
    </div>

    <textarea id="rating-review" placeholder="Tulis masukan Anda untuk peningkatan layanan kami..." class="w-full p-3 border border-oceanLight rounded-xl text-xs focus:outline-none focus:border-toscaDark" rows="3"></textarea>

    <div class="flex gap-3">
      <a href="dashboard.html" class="w-1/3 py-2.5 border border-slate-200 text-slate-500 font-medium rounded-xl text-xs hover:bg-slate-50 text-center transition-all">Lewati</a>
      <button id="submit-rating" class="w-2/3 py-2.5 bg-toscaDark text-white font-medium rounded-xl text-xs shadow-md hover:bg-toscaLight transition-all">Kirim Penilaian</button>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/features.js"></script>
</body>
</html>
