<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/jpeg" href="icon.jpeg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konsultasi - Cerai.Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            toscaDark: '#0D7A87',
            toscaLight: '#20B2AA',
            oceanBlue: '#4A9DEC',
            oceanLight: '#EBF4FA',
            sandWhite: '#F7FCFC'
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-sandWhite text-slate-800 antialiased min-h-screen flex">

  <aside class="w-64 bg-slate-100 border-r border-oceanLight p-4 space-y-4 text-sm text-slate-600 flex flex-col">
    <div class="font-bold text-toscaDark mb-4 text-lg">Cerai.Pro</div>
    <div class="p-2.5 bg-white border border-oceanLight rounded-lg font-medium text-slate-800">&vellip; Daftar Percakapan</div>
    <div class="flex-grow"></div>
    <a href="dashboard.html" class="p-2.5 hover:bg-white rounded-lg cursor-pointer block text-slate-500 hover:text-toscaDark">&larr; Kembali ke Dashboard</a>
  </aside>

  <div class="flex-grow flex flex-col">
    <div class="p-4 border-b border-oceanLight flex justify-between items-center bg-sandWhite">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-toscaDark/20 rounded-full flex items-center justify-center font-bold text-toscaDark">A</div>
        <div>
          <div class="font-bold text-slate-800 text-sm" id="chat-lawyer-name">-</div>
          <div class="text-xs text-emerald-600 flex items-center gap-1">&bull; Online <span class="text-slate-400 font-normal">| Sesi Aktif</span></div>
        </div>
      </div>
      <div>
        <span id="chat-client-name" class="text-xs text-slate-400 mr-3"></span>
        <a href="rating.html" class="bg-toscaDark text-white text-xs px-4 py-2 rounded-lg font-medium shadow hover:bg-toscaLight">Akhiri Sesi Konsultasi</a>
      </div>
    </div>

    <div id="chat-messages" class="flex-grow p-6 space-y-4 bg-slate-50 overflow-y-auto"></div>

    <div class="p-4 border-t border-oceanLight bg-white">
      <div class="flex gap-3">
        <input type="text" id="chat-input" placeholder="Ketik pesan Anda..." onkeypress="if(event.key==='Enter')sendMessage()" class="flex-grow p-2.5 border border-oceanLight rounded-xl text-xs focus:outline-none focus:border-toscaDark bg-white">
        <button onclick="sendMessage()" class="bg-toscaDark text-white px-5 py-2.5 rounded-xl text-xs font-medium hover:bg-toscaLight transition-all shadow-sm">Kirim</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/features.js"></script>
</body>
</html>
